<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vadyapathak Booking</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Poppins', sans-serif;
    }

    body {
        background: #fbf2dc;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px;
    }

    .booking-container {
        background: white;
        width: 100%;
        max-width: 650px;
        padding: 35px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #e67e22;
    }

    .form-group {
        margin-bottom: 15px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-size: 14px;
        font-weight: 500;
        color: #333;
    }

    input, select, textarea {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #ddd;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
        transition: 0.3s;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #e67e22;
    }

    textarea {
        resize: none;
        height: 80px;
    }

    .instrument-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 10px 15px;
        margin-top: 10px;
    }

    .submit-btn {
        width: 100%;
        padding: 12px;
        border: none;
        background: linear-gradient(45deg, #e67e22, #f39c12);
        color: white;
        font-size: 16px;
        border-radius: 30px;
        cursor: pointer;
        margin-top: 20px;
        transition: 0.3s;
    }

    .submit-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 15px rgba(0,0,0,0.15);
    }

    @media (max-width: 600px) {
        .instrument-grid {
            grid-template-columns: 1fr;
        }
    }
</style>
</head>

<body>

<div class="booking-container">
    <h2>Vadyapathak Booking</h2>

    <form>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Mobile Number</label>
            <input type="tel" placeholder="Enter mobile number" required>
        </div>

        <div class="form-group">
            <label>Event Date</label>
            <input type="date" required>
        </div>

        <div class="form-group">
            <label>Event Type</label>
            <select required>
                <option value="">Select Event</option>
                <option>Wedding</option>
                <option>Ganesh Festival</option>
                <option>Procession</option>
                <option>Religious Event</option>
                <option>Other</option>
            </select>
        </div>

        <div class="form-group">
            <label>Event Location</label>
            <input type="text" placeholder="Enter location" required>
        </div>

        <!-- ✅ Instrument Selection -->

        <div class="form-group">
            <label>Required Instruments</label>

            <div class="instrument-grid">

                <div>
                    <label>Dhol</label>
                    <input type="number" min="0" placeholder="Count">
                </div>

                <div>
                    <label>Tasha</label>
                    <input type="number" min="0" placeholder="Count">
                </div>

                <div>
                    <label>Zanj</label>
                    <input type="number" min="0" placeholder="Count">
                </div>

                <div>
                    <label>Lezim</label>
                    <input type="number" min="0" placeholder="Count">
                </div>

                <div>
                    <label>Halgi</label>
                    <input type="number" min="0" placeholder="Count">
                </div>

                <div>
                    <label>Other</label>
                    <input type="text" placeholder="Specify">
                </div>

            </div>
        </div>

        <div class="form-group">
            <label>Additional Details</label>
            <textarea placeholder="Enter message"></textarea>
        </div>

        <button class="submit-btn">Book Now</button>

    </form>
</div>

</body>
</html>
